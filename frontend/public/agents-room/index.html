<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NXT8 Agent Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050507;
      --bg-soft: rgba(8, 10, 18, 0.72);
      --panel: rgba(7, 9, 14, 0.7);
      --panel-strong: rgba(7, 9, 14, 0.88);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f2f5ff;
      --muted: rgba(201, 210, 245, 0.62);
      --cyan: #00e5ff;
      --green: #4df6b2;
      --purple: #9b6cff;
      --amber: #ffbb57;
      --pink: #ff5aa5;
      --shadow: 0 18px 80px rgba(0, 0, 0, 0.45);
      --blur: blur(18px);
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 12%, rgba(85, 120, 255, 0.18), transparent 28%),
        radial-gradient(circle at 20% 85%, rgba(120, 50, 255, 0.12), transparent 25%),
        radial-gradient(circle at 80% 70%, rgba(0, 229, 255, 0.08), transparent 24%),
        #050507;
      color: var(--text);
      font-family: "Outfit", sans-serif;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    .app-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
    }

    .browser-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 18px;
      background: linear-gradient(180deg, rgba(10, 12, 18, 0.92), rgba(10, 12, 18, 0.72));
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35);
    }

    .browser-left,
    .browser-right,
    .browser-center {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .chrome-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      opacity: 0.9;
    }

    .chrome-dot:nth-child(1) { background: #ff5f57; }
    .chrome-dot:nth-child(2) { background: #febc2e; }
    .chrome-dot:nth-child(3) { background: #28c840; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      text-decoration: none;
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.02);
    }

    .back-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 229, 255, 0.38);
      background: rgba(0, 229, 255, 0.06);
    }

    .address-bar {
      min-width: min(44vw, 440px);
      justify-content: center;
      padding: 8px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(244, 248, 255, 0.82);
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .browser-icon {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      font-size: 14px;
    }

    #scene {
      position: absolute;
      inset: 0;
    }

    .scene-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .scene-overlay::before,
    .scene-overlay::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scene-overlay::before {
      background:
        radial-gradient(circle at center, transparent 46%, rgba(3, 5, 10, 0.18) 74%, rgba(3, 5, 10, 0.4) 100%),
        linear-gradient(180deg, rgba(5, 7, 12, 0) 0%, rgba(5, 7, 12, 0.08) 60%, rgba(5, 7, 12, 0.18) 100%);
    }

    .scene-overlay::after {
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 100% 4px, 4px 100%;
      opacity: 0.11;
      mix-blend-mode: screen;
    }

    .stats-ribbon {
      position: absolute;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(9, 10, 15, 0.45);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      pointer-events: auto;
    }

    .stat-block {
      min-width: 64px;
      text-align: center;
    }

    .stat-val {
      font-family: "IBM Plex Mono", monospace;
      font-size: 18px;
      font-weight: 600;
      line-height: 1;
    }

    .stat-lbl {
      margin-top: 4px;
      color: rgba(201, 210, 245, 0.5);
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(77, 246, 178, 0.28);
      background: rgba(77, 246, 178, 0.07);
      color: var(--green);
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px rgba(77, 246, 178, 0.8);
      animation: pulse 1.35s infinite;
    }

    .left-panel,
    .detail-panel {
      position: absolute;
      top: 96px;
      bottom: 22px;
      z-index: 25;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(6, 8, 14, 0.76), rgba(6, 8, 14, 0.62));
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
      pointer-events: auto;
    }

    .left-panel {
      left: 20px;
      width: 264px;
      border-radius: 24px;
      overflow: hidden;
    }

    .detail-panel {
      right: 20px;
      width: 320px;
      border-radius: 28px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transform: translateX(0);
      transition: transform 0.28s ease, opacity 0.28s ease;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .panel-label {
      color: rgba(201, 210, 245, 0.52);
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
    }

    .panel-chip {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(155, 108, 255, 0.26);
      background: rgba(155, 108, 255, 0.08);
      color: #c9b0ff;
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
    }

    .agent-list {
      padding: 10px;
      overflow-y: auto;
      height: calc(100% - 62px);
    }

    .agent-row {
      width: 100%;
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      margin-bottom: 9px;
      cursor: pointer;
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
      text-align: left;
      color: var(--text);
    }

    .agent-row:hover,
    .agent-row.sel {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.05);
      border-color: color-mix(in srgb, var(--c) 52%, rgba(255,255,255,0.08));
      box-shadow: inset 0 0 20px color-mix(in srgb, var(--c) 12%, transparent), 0 8px 24px rgba(0,0,0,0.18);
    }

    .agent-avatar {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 18px rgba(255,255,255,0.03);
    }

    .agent-name {
      font-size: 14px;
      font-weight: 600;
    }

    .agent-sub {
      margin-top: 3px;
      color: rgba(201, 210, 245, 0.56);
      font-size: 11px;
      font-family: "IBM Plex Mono", monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-side-stat {
      text-align: right;
      min-width: 52px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 9px;
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .status-active {
      color: var(--green);
      background: rgba(77, 246, 178, 0.08);
    }

    .status-busy {
      color: var(--amber);
      background: rgba(255, 187, 87, 0.08);
    }

    .status-idle {
      color: rgba(201, 210, 245, 0.46);
      background: rgba(255, 255, 255, 0.04);
    }

    .agent-side-num {
      margin-top: 6px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 16px;
      font-weight: 600;
    }

    .detail-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: rgba(201, 210, 245, 0.4);
      font-size: 14px;
      line-height: 1.8;
      padding: 22px;
    }

    .detail-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .detail-id {
      width: 60px;
      height: 60px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 22px rgba(255,255,255,0.03);
    }

    .detail-badge {
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(230, 235, 255, 0.84);
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .detail-name {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.05;
    }

    .detail-role {
      margin-top: 4px;
      color: rgba(201, 210, 245, 0.6);
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .detail-copy {
      color: rgba(237, 241, 255, 0.78);
      font-size: 14px;
      line-height: 1.7;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric-card {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      box-shadow: inset 0 0 18px rgba(255,255,255,0.02);
    }

    .metric-value {
      font-family: "IBM Plex Mono", monospace;
      font-size: 22px;
      font-weight: 600;
    }

    .metric-label {
      margin-top: 5px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(201, 210, 245, 0.5);
    }

    .live-box {
      padding: 14px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .live-box-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 18px currentColor;
    }

    .live-box-text {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      line-height: 1.6;
      color: rgba(237, 241, 255, 0.86);
    }

    .init-btn {
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: inset 0 0 20px rgba(255,255,255,0.03), 0 12px 32px rgba(0,0,0,0.22);
    }

    .init-btn:hover {
      transform: translateY(-1px);
      box-shadow: inset 0 0 20px rgba(255,255,255,0.04), 0 16px 36px rgba(0,0,0,0.28);
      border-color: rgba(0, 229, 255, 0.35);
    }

    #labels-layer {
      position: absolute;
      inset: 0;
      z-index: 24;
      pointer-events: none;
    }

    .agent-label {
      position: absolute;
      transform: translate(-50%, -50%);
      min-width: 138px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: linear-gradient(180deg, rgba(8, 10, 16, 0.9), rgba(8, 10, 16, 0.66));
      box-shadow:
        0 10px 36px rgba(0, 0, 0, 0.36),
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 26px color-mix(in srgb, var(--c) 22%, transparent);
      backdrop-filter: blur(14px);
      color: var(--text);
      font-size: 11px;
      line-height: 1.15;
      pointer-events: auto;
      transition: opacity 0.18s ease, transform 0.18s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      text-align: center;
      opacity: 0.88;
    }

    .agent-label:hover,
    .agent-label.is-active {
      border-color: color-mix(in srgb, var(--c) 72%, rgba(255,255,255,0.14));
      box-shadow:
        0 14px 44px rgba(0, 0, 0, 0.44),
        0 0 34px color-mix(in srgb, var(--c) 34%, transparent),
        inset 0 0 0 1px rgba(255,255,255,0.03);
      transform: translate(-50%, -54%);
      opacity: 1;
    }

    .label-role {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(237, 241, 255, 0.92);
      font-weight: 600;
    }

    .label-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--c);
      box-shadow: 0 0 16px color-mix(in srgb, var(--c) 80%, transparent);
    }

    .label-sub {
      margin-top: 4px;
      color: rgba(201, 210, 245, 0.56);
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bottom-hint {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 26;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.24);
      color: rgba(225, 232, 255, 0.48);
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      backdrop-filter: blur(12px);
      white-space: nowrap;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(1.25); }
    }

    @media (max-width: 1180px) {
      .left-panel {
        width: 236px;
      }

      .detail-panel {
        width: 286px;
      }
    }

    @media (max-width: 980px) {
      html, body {
        overflow: auto;
        overflow-x: hidden;
      }

      .app-shell {
        min-height: 100vh;
        height: auto;
        overflow: visible;
        padding-bottom: 20px;
      }

      #scene {
        position: relative;
        min-height: 52vh;
        height: 52vh;
        margin-top: 84px;
      }

      .scene-overlay,
      #labels-layer {
        top: 84px;
        height: calc(52vh);
        bottom: auto;
      }

      .stats-ribbon {
        top: 94px;
        width: calc(100% - 24px);
        max-width: 620px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .left-panel,
      .detail-panel {
        position: relative;
        top: auto;
        left: auto;
        right: auto;
        bottom: auto;
        width: calc(100% - 24px);
        margin: 14px auto 0;
      }

      .left-panel {
        height: auto;
        max-height: 280px;
      }

      .detail-panel {
        min-height: 360px;
      }

      .agent-list {
        height: auto;
        max-height: 216px;
      }

      .bottom-hint {
        bottom: auto;
        top: calc(84px + 52vh - 42px);
        width: calc(100% - 28px);
        white-space: normal;
        text-align: center;
      }
    }

    @media (max-width: 700px) {
      #labels-layer {
        overflow: hidden;
      }

      .agent-label {
        min-width: 112px;
        padding: 8px 10px;
        font-size: 10px;
      }

      .label-sub {
        font-size: 8px;
      }

      .browser-bar {
        padding: 10px 12px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .browser-left,
      .browser-right,
      .browser-center {
        width: 100%;
        justify-content: center;
      }

      .address-bar {
        min-width: 0;
        width: 100%;
      }

      .stats-ribbon {
        gap: 12px;
        padding: 10px 14px;
      }

      .left-panel,
      .detail-panel {
        width: calc(100% - 16px);
      }

      .detail-name {
        font-size: 24px;
      }

      .metrics-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell" data-testid="agents-room-page">
    <div class="browser-bar" data-testid="agents-room-browser-bar">
      <div class="browser-left">
        <div style="display:flex; gap:7px; align-items:center;">
          <span class="chrome-dot"></span>
          <span class="chrome-dot"></span>
          <span class="chrome-dot"></span>
        </div>
        <a href="/" class="back-btn" data-testid="back-to-nav-btn">↩ Dashboard</a>
      </div>

      <div class="browser-center">
        <div class="address-bar" data-testid="agents-room-address">localhost / nxt8 / agent-room</div>
      </div>

      <div class="browser-right">
        <span class="browser-icon">⟳</span>
        <span class="browser-icon">◎</span>
      </div>
    </div>

    <div class="stats-ribbon" data-testid="agents-room-stats">
      <div class="stat-block" data-testid="agents-room-stat-active">
        <div class="stat-val" id="h-active" style="color:var(--green)">0</div>
        <div class="stat-lbl">active</div>
      </div>
      <div class="stat-block" data-testid="agents-room-stat-today">
        <div class="stat-val" id="h-today" style="color:var(--cyan)">0</div>
        <div class="stat-lbl">today</div>
      </div>
      <div class="stat-block" data-testid="agents-room-stat-conv">
        <div class="stat-val" id="h-conv" style="color:var(--purple)">0%</div>
        <div class="stat-lbl">conv</div>
      </div>
      <div class="live-pill" data-testid="agents-room-live-indicator"><span class="live-dot"></span> live sync</div>
    </div>

    <div id="scene" data-testid="agents-room-scene"></div>
    <div class="scene-overlay"></div>
    <div id="labels-layer"></div>

    <aside class="left-panel" data-testid="agents-room-team-panel">
      <div class="panel-head">
        <span class="panel-label">team matrix</span>
        <span class="panel-chip">8 agents</span>
      </div>
      <div class="agent-list" id="agent-list" data-testid="agents-room-agent-list"></div>
    </aside>

    <aside class="detail-panel" id="detail" data-testid="agent-detail-panel">
      <div class="detail-empty">Выберите агента слева или кликните по сцене,<br/>чтобы открыть cinematic-профиль.</div>
    </aside>

    <div class="bottom-hint" data-testid="agents-room-hint">drag rotate · scroll zoom · click select agent</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const AGENTS = [
      { id: 0, name: "Hermes", label: "Ops Orchestrator", role: "Chief orchestration core", emoji: "⚡", color: 0x9b6cff, hex: "#9b6cff", status: "active", statusText: "Routing workflows", active: 47, today: 23, conv: 9.1, liveStatus: "Delegating an escalation to Pulse", summary: "Координирует потоки задач, контекст и handoff между агентами NXT8." },
      { id: 1, name: "Pulse", label: "Analytics Core", role: "Signal intelligence", emoji: "📊", color: 0x00e5ff, hex: "#00e5ff", status: "active", statusText: "Generating digest", active: 38, today: 17, conv: 7.4, liveStatus: "Processing KPI anomalies", summary: "Отслеживает ключевые сигналы, тренды и аномалии в операционном контуре." },
      { id: 2, name: "Aria", label: "CRM Flow", role: "Client lifecycle agent", emoji: "👤", color: 0xff5aa5, hex: "#ff5aa5", status: "active", statusText: "Updating contacts", active: 29, today: 44, conv: 11.2, liveStatus: "Syncing new lead status", summary: "Держит клиентскую коммуникацию, воронку и follow-up в живом состоянии." },
      { id: 3, name: "Scout", label: "Market Scout", role: "External research node", emoji: "🔍", color: 0x4c87ff, hex: "#4c87ff", status: "active", statusText: "Scanning market", active: 15, today: 8, conv: 5.6, liveStatus: "Fetching competitor signals", summary: "Ищет внешние сигналы, рынок и конкурентные паттерны без потери фокуса." },
      { id: 4, name: "Forge", label: "Content Forge", role: "Offer crafting agent", emoji: "✍️", color: 0x4df6b2, hex: "#4df6b2", status: "active", statusText: "Drafting proposals", active: 21, today: 31, conv: 14.3, liveStatus: "Writing proposal draft #7", summary: "Собирает тексты, офферы и формулировки под бизнес-контекст компании." },
      { id: 5, name: "Ledger", label: "Finance Node", role: "Revenue control layer", emoji: "💰", color: 0xffbb57, hex: "#ffbb57", status: "busy", statusText: "Reconciling invoices", active: 9, today: 12, conv: 6.8, liveStatus: "Reconciling Q2 figures", summary: "Контролирует финансовые движения, сводки, инвойсы и ROI-контур." },
      { id: 6, name: "Nexus", label: "Integration Grid", role: "System bridge", emoji: "🔗", color: 0xff8c42, hex: "#ff8c42", status: "active", statusText: "Syncing APIs", active: 33, today: 19, conv: 8.9, liveStatus: "Syncing Slack webhook", summary: "Связывает внешние сервисы, вебхуки и внутренние системные контуры." },
      { id: 7, name: "Echo", label: "Memory Vault", role: "Context preservation", emoji: "🧠", color: 0x7d6cff, hex: "#7d6cff", status: "idle", statusText: "Standby", active: 0, today: 5, conv: 0.0, liveStatus: "Memory graph indexed", summary: "Хранит накопленную память, связь решений и эволюцию контекста." },
    ];

    const container = document.getElementById("scene");
    const listEl = document.getElementById("agent-list");
    const detailEl = document.getElementById("detail");
    const labelsLayer = document.getElementById("labels-layer");

    let metrics = AGENTS.map((a) => ({ active: a.active, today: a.today, conv: a.conv }));
    let selected = null;
    let hovered = null;
    let dragDistance = 0;
    const robots = [];
    const labelMap = new Map();

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(container.clientWidth, container.clientHeight, false);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.18;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.domElement.setAttribute("data-testid", "agents-room-canvas");
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050507, 0.017);

    const camera = new THREE.PerspectiveCamera(46, 1, 0.1, 160);
    const target = new THREE.Vector3(0, 1.7, -1.2);
    const camState = { theta: 0, phi: 0.86, radius: 17.8, tx: target.x, ty: target.y, tz: target.z };
    const baseCameraState = { theta: 0, phi: 0.86, radius: 17.8, tx: 0, ty: 1.7, tz: -1.2 };

    function updateCamera() {
      const sinPhi = Math.sin(camState.phi);
      camera.position.x = camState.tx + camState.radius * sinPhi * Math.sin(camState.theta);
      camera.position.y = camState.ty + camState.radius * Math.cos(camState.phi);
      camera.position.z = camState.tz + camState.radius * sinPhi * Math.cos(camState.theta);
      camera.lookAt(camState.tx, camState.ty, camState.tz);
    }
    updateCamera();

    const hemi = new THREE.HemisphereLight(0x2b3c7a, 0x050507, 1.2);
    scene.add(hemi);

    const ambient = new THREE.AmbientLight(0x5d74b8, 0.45);
    scene.add(ambient);

    const keyLight = new THREE.SpotLight(0xbfd7ff, 1.9, 70, 0.48, 0.45, 1);
    keyLight.position.set(0, 16, 8);
    keyLight.target.position.set(0, 0, -2.5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 1024;
    keyLight.shadow.mapSize.height = 1024;
    scene.add(keyLight);
    scene.add(keyLight.target);

    const rimLight = new THREE.PointLight(0x7d6cff, 1.5, 34, 2.4);
    rimLight.position.set(-12, 4, -11);
    scene.add(rimLight);

    const cyanLight = new THREE.PointLight(0x00e5ff, 1.4, 32, 2);
    cyanLight.position.set(12, 5, -9);
    scene.add(cyanLight);

    const floorTexture = (() => {
      const size = 1024;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      const grad = ctx.createLinearGradient(0, 0, 0, size);
      grad.addColorStop(0, "#0d1020");
      grad.addColorStop(1, "#040507");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      ctx.strokeStyle = "rgba(110,140,255,0.08)";
      ctx.lineWidth = 1;
      for (let i = 0; i < size; i += 64) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, size);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(size, i);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(0,229,255,0.16)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(size / 2, size * 0.9, size * 0.44, Math.PI * 1.06, Math.PI * 1.94);
      ctx.stroke();

      ctx.strokeStyle = "rgba(155,108,255,0.18)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(size / 2, size * 0.9, size * 0.27, Math.PI * 1.08, Math.PI * 1.92);
      ctx.stroke();

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(1.2, 1.2);
      return tex;
    })();

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(22, 88),
      new THREE.MeshStandardMaterial({
        map: floorTexture,
        color: 0x09101a,
        roughness: 0.28,
        metalness: 0.72,
        transparent: true,
        opacity: 0.96,
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(0, -1.42, -1.4);
    floor.receiveShadow = true;
    scene.add(floor);

    const outerArc = new THREE.Mesh(
      new THREE.RingGeometry(13.7, 14.12, 96, 1, Math.PI * 0.18, Math.PI * 0.64),
      new THREE.MeshBasicMaterial({ color: 0x6f7dff, transparent: true, opacity: 0.28, side: THREE.DoubleSide })
    );
    outerArc.rotation.x = -Math.PI / 2;
    outerArc.rotation.z = Math.PI * 1.09;
    outerArc.position.set(0, -1.38, -1.8);
    scene.add(outerArc);

    const innerArc = new THREE.Mesh(
      new THREE.RingGeometry(7.2, 7.46, 96, 1, Math.PI * 0.2, Math.PI * 0.6),
      new THREE.MeshBasicMaterial({ color: 0x8b63ff, transparent: true, opacity: 0.32, side: THREE.DoubleSide })
    );
    innerArc.rotation.x = -Math.PI / 2;
    innerArc.rotation.z = Math.PI * 1.1;
    innerArc.position.set(0, -1.37, -1.2);
    scene.add(innerArc);

    function createWallTexture(width = 1200, height = 520) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      const grad = ctx.createLinearGradient(0, 0, 0, height);
      grad.addColorStop(0, "#10152b");
      grad.addColorStop(1, "#040507");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);

      for (let i = 0; i < 84; i += 1) {
        const x = Math.random() * width;
        const y = 80 + Math.random() * (height - 200);
        const w = 9 + Math.random() * 16;
        const h = 18 + Math.random() * 28;
        const c = Math.random() > 0.7 ? "rgba(0,229,255,0.92)" : "rgba(220,235,255,0.88)";
        ctx.fillStyle = c;
        ctx.fillRect(x, y, w, h);
        ctx.shadowColor = c;
        ctx.shadowBlur = 18;
        ctx.fillRect(x, y, w, h);
        ctx.shadowBlur = 0;
      }

      for (let i = 0; i < 14; i += 1) {
        const x = 10 + i * 84;
        ctx.fillStyle = "rgba(255,255,255,0.04)";
        ctx.fillRect(x, 40, 42 + Math.random() * 30, height - 80);
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    const wallTexture = createWallTexture();
    const wallMat = new THREE.MeshStandardMaterial({
      map: wallTexture,
      emissive: 0x1b2b64,
      emissiveIntensity: 0.42,
      roughness: 0.86,
      metalness: 0.12,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.95,
    });

    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(25, 9.6), wallMat);
    backWall.position.set(0, 3.3, -12.2);
    scene.add(backWall);

    const sideWallLeft = new THREE.Mesh(new THREE.PlaneGeometry(8.4, 8.8), wallMat.clone());
    sideWallLeft.position.set(-10.4, 3.05, -9.4);
    sideWallLeft.rotation.y = 0.56;
    scene.add(sideWallLeft);

    const sideWallRight = new THREE.Mesh(new THREE.PlaneGeometry(8.4, 8.8), wallMat.clone());
    sideWallRight.position.set(10.4, 3.05, -9.4);
    sideWallRight.rotation.y = -0.56;
    scene.add(sideWallRight);

    const wallGlowArc = new THREE.Mesh(
      new THREE.RingGeometry(12.4, 12.9, 84, 1, Math.PI * 0.24, Math.PI * 0.52),
      new THREE.MeshBasicMaterial({ color: 0x7d6cff, transparent: true, opacity: 0.16, side: THREE.DoubleSide })
    );
    wallGlowArc.rotation.x = Math.PI / 2;
    wallGlowArc.rotation.z = Math.PI * 1.12;
    wallGlowArc.position.set(0, 1.85, -9.2);
    scene.add(wallGlowArc);

    const haze = new THREE.Mesh(
      new THREE.SphereGeometry(3.2, 24, 24),
      new THREE.MeshBasicMaterial({ color: 0x6e80ff, transparent: true, opacity: 0.08 })
    );
    haze.position.set(-7.2, -0.2, 3.4);
    scene.add(haze);

    const globe = new THREE.Group();
    const globeWire = new THREE.Mesh(
      new THREE.SphereGeometry(1.05, 14, 14),
      new THREE.MeshBasicMaterial({ color: 0x83c9ff, wireframe: true, transparent: true, opacity: 0.4 })
    );
    const globeCore = new THREE.Mesh(
      new THREE.SphereGeometry(0.62, 18, 18),
      new THREE.MeshBasicMaterial({ color: 0x7d6cff, transparent: true, opacity: 0.12 })
    );
    globe.add(globeWire, globeCore);
    globe.position.set(-7.4, -0.2, 5.1);
    scene.add(globe);

    const particleCount = 140;
    const particleGeo = new THREE.BufferGeometry();
    const particleArray = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i += 1) {
      particleArray[i * 3] = (Math.random() - 0.5) * 28;
      particleArray[i * 3 + 1] = Math.random() * 10 - 0.2;
      particleArray[i * 3 + 2] = (Math.random() - 0.2) * 22;
    }
    particleGeo.setAttribute("position", new THREE.BufferAttribute(particleArray, 3));
    const particles = new THREE.Points(
      particleGeo,
      new THREE.PointsMaterial({ color: 0xc8dcff, size: 0.05, transparent: true, opacity: 0.58 })
    );
    scene.add(particles);

    function buildRobot(agent, pos, index) {
      const accent = new THREE.Color(agent.color);
      const group = new THREE.Group();
      group.position.copy(pos);
      group.userData.agentIndex = index;

      const pod = new THREE.Group();
      const baseMat = new THREE.MeshStandardMaterial({ color: 0x0a0f16, roughness: 0.44, metalness: 0.78 });
      const glossMat = new THREE.MeshStandardMaterial({ color: 0x101724, roughness: 0.18, metalness: 0.84 });
      const glowMat = new THREE.MeshStandardMaterial({ color: accent, emissive: accent, emissiveIntensity: 1.3, roughness: 0.12, metalness: 0.72 });
      const darkMat = new THREE.MeshStandardMaterial({ color: 0x191d29, roughness: 0.52, metalness: 0.24 });
      const faceMat = new THREE.MeshStandardMaterial({ color: 0xe8efff, roughness: 0.55, metalness: 0.08 });

      const base = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.9, 0.78, 32), glossMat);
      base.position.y = -1.06;
      base.castShadow = true;
      base.receiveShadow = true;
      pod.add(base);

      const deck = new THREE.Mesh(new THREE.CylinderGeometry(1.36, 1.56, 0.18, 32), baseMat);
      deck.position.y = -0.58;
      deck.castShadow = true;
      pod.add(deck);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(1.55, 0.07, 16, 48),
        new THREE.MeshBasicMaterial({ color: agent.color, transparent: true, opacity: 0.74 })
      );
      ring.rotation.x = Math.PI / 2;
      ring.position.y = -0.57;
      pod.add(ring);

      const halo = new THREE.Mesh(
        new THREE.TorusGeometry(0.72, 0.08, 16, 44),
        new THREE.MeshBasicMaterial({ color: agent.color, transparent: true, opacity: 0.9 })
      );
      halo.position.set(0, 2.68, 0);
      pod.add(halo);

      const haloIcon = new THREE.Mesh(
        new THREE.CircleGeometry(0.23, 24),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.22 })
      );
      haloIcon.position.set(0, 2.68, 0.01);
      pod.add(haloIcon);

      const deskTop = new THREE.Mesh(new THREE.BoxGeometry(1.98, 0.1, 0.9), baseMat);
      deskTop.position.set(0, -0.44, 0.28);
      deskTop.castShadow = true;
      pod.add(deskTop);

      const deskEdge = new THREE.Mesh(new THREE.BoxGeometry(2.02, 0.04, 0.05), glowMat);
      deskEdge.position.set(0, -0.39, -0.14);
      pod.add(deskEdge);

      const monitor = new THREE.Mesh(new THREE.BoxGeometry(0.76, 0.56, 0.08), darkMat);
      monitor.position.set(0.46, -0.08, -0.02);
      monitor.rotation.y = -0.08;
      pod.add(monitor);

      const monitorScreen = new THREE.Mesh(new THREE.BoxGeometry(0.64, 0.44, 0.03), glowMat);
      monitorScreen.position.set(0.47, -0.08, 0.02);
      monitorScreen.rotation.y = -0.08;
      pod.add(monitorScreen);

      const stand = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.28, 0.08), darkMat);
      stand.position.set(0.46, -0.36, -0.02);
      pod.add(stand);

      const chair = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.5, 0.38), baseMat);
      chair.position.set(-0.68, -0.72, 0.18);
      pod.add(chair);

      const bodyGroup = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.94, 0.48), darkMat);
      body.position.y = 0.28;
      body.castShadow = true;
      bodyGroup.add(body);

      const face = new THREE.Mesh(new THREE.BoxGeometry(0.58, 0.44, 0.06), faceMat);
      face.position.set(0, 0.88, 0.24);
      bodyGroup.add(face);

      const head = new THREE.Mesh(new THREE.BoxGeometry(0.74, 0.56, 0.56), darkMat);
      head.position.y = 0.88;
      head.castShadow = true;
      bodyGroup.add(head);

      const eyeMat = new THREE.MeshStandardMaterial({ color: accent, emissive: accent, emissiveIntensity: 2.4, roughness: 0.08, metalness: 0.4 });
      const leftEye = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.08, 0.04), eyeMat);
      leftEye.position.set(-0.12, 0.92, 0.31);
      const rightEye = leftEye.clone();
      rightEye.position.x = 0.12;
      bodyGroup.add(leftEye, rightEye);

      const shoulderGlow = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.12), glowMat);
      shoulderGlow.position.set(0, 0.62, 0.18);
      bodyGroup.add(shoulderGlow);

      const armGeo = new THREE.BoxGeometry(0.16, 0.48, 0.16);
      const leftArm = new THREE.Mesh(armGeo, darkMat);
      leftArm.position.set(-0.46, 0.22, 0.02);
      const rightArm = leftArm.clone();
      rightArm.position.x = 0.46;
      bodyGroup.add(leftArm, rightArm);

      const legGeo = new THREE.BoxGeometry(0.18, 0.54, 0.18);
      const leftLeg = new THREE.Mesh(legGeo, darkMat);
      leftLeg.position.set(-0.16, -0.52, 0.02);
      const rightLeg = leftLeg.clone();
      rightLeg.position.x = 0.16;
      bodyGroup.add(leftLeg, rightLeg);

      bodyGroup.position.set(-0.34, -0.12, -0.02);
      pod.add(bodyGroup);

      const point = new THREE.PointLight(agent.color, 1.45, 6, 2.4);
      point.position.set(0, 1.25, 0.8);
      pod.add(point);

      group.add(pod);
      scene.add(group);

      return {
        group,
        pod,
        ring,
        halo,
        haloIcon,
        bodyGroup,
        leftArm,
        rightArm,
        leftLeg,
        rightLeg,
        monitorScreen,
        point,
        accent,
        focusTarget: new THREE.Vector3(pos.x, 0.55, pos.z),
        labelAnchor: new THREE.Vector3(pos.x, 2.96, pos.z),
        agent,
      };
    }

    const radius = 8.2;
    const arcStart = -1.02;
    const arcEnd = 1.02;
    AGENTS.forEach((agent, index) => {
      const t = index / (AGENTS.length - 1);
      const angle = arcStart + (arcEnd - arcStart) * t;
      const pos = new THREE.Vector3(Math.sin(angle) * radius, 0, -4.5 + Math.cos(angle) * 2.8);
      const robot = buildRobot(agent, pos, index);
      robot.group.lookAt(0, 0.1, 3.8);
      robots.push(robot);

      const label = document.createElement("button");
      label.type = "button";
      label.className = "agent-label";
      label.style.setProperty("--c", agent.hex);
      label.setAttribute("data-testid", `agent-pod-label-${agent.name.toLowerCase()}`);
      label.innerHTML = `
        <div class="label-role"><span class="label-dot"></span>${agent.label}</div>
        <div class="label-sub">${agent.name}</div>
      `;
      label.addEventListener("click", () => selectAgent(index));
      labelsLayer.appendChild(label);
      labelMap.set(index, label);
    });

    function statusClass(status) {
      if (status === "active") return "status-pill status-active";
      if (status === "busy") return "status-pill status-busy";
      return "status-pill status-idle";
    }

    function buildList() {
      listEl.innerHTML = "";
      AGENTS.forEach((agent, index) => {
        const row = document.createElement("button");
        row.type = "button";
        row.className = `agent-row${selected === index ? " sel" : ""}`;
        row.style.setProperty("--c", agent.hex);
        row.setAttribute("data-testid", `agents-room-agent-${agent.name.toLowerCase()}`);
        row.innerHTML = `
          <div class="agent-avatar" style="background:${agent.hex}22; box-shadow: 0 0 24px ${agent.hex}22; color:${agent.hex};">${agent.emoji}</div>
          <div>
            <div class="agent-name">${agent.name}</div>
            <div class="agent-sub">${agent.statusText}</div>
          </div>
          <div class="agent-side-stat">
            <span class="${statusClass(agent.status)}">${agent.status}</span>
            <div class="agent-side-num" style="color:${agent.hex}">${metrics[index].active}</div>
          </div>
        `;
        row.addEventListener("mouseenter", () => { hovered = index; });
        row.addEventListener("mouseleave", () => { hovered = null; });
        row.addEventListener("click", () => selectAgent(index));
        listEl.appendChild(row);
      });

      document.getElementById("h-active").textContent = AGENTS.filter((a) => a.status === "active").length;
      document.getElementById("h-today").textContent = metrics.reduce((sum, item) => sum + item.today, 0);
      const avgConv = metrics.reduce((sum, item) => sum + item.conv, 0) / metrics.length;
      document.getElementById("h-conv").textContent = `${avgConv.toFixed(1)}%`;
    }

    function buildDetail() {
      if (selected === null) {
        detailEl.innerHTML = `<div class="detail-empty">Выберите агента слева или кликните по сцене,<br/>чтобы открыть cinematic-профиль.</div>`;
        return;
      }

      const agent = AGENTS[selected];
      const metric = metrics[selected];
      const statusColor = agent.status === "active" ? "var(--green)" : agent.status === "busy" ? "var(--amber)" : "rgba(201,210,245,0.5)";
      detailEl.innerHTML = `
        <div class="detail-top">
          <div class="detail-id" style="background:${agent.hex}18; color:${agent.hex};">${agent.emoji}</div>
          <div class="detail-badge" style="border-color:${agent.hex}55; box-shadow: 0 0 22px ${agent.hex}22;">${agent.label}</div>
        </div>
        <div>
          <div class="detail-name">${agent.name}</div>
          <div class="detail-role">${agent.role}</div>
        </div>
        <div class="detail-copy">${agent.summary}</div>
        <div class="metrics-grid">
          <div class="metric-card"><div class="metric-value" style="color:${agent.hex}">${metric.active}</div><div class="metric-label">active load</div></div>
          <div class="metric-card"><div class="metric-value" style="color:var(--cyan)">${metric.today}</div><div class="metric-label">today tasks</div></div>
          <div class="metric-card" style="grid-column: 1 / -1;"><div class="metric-value" style="color:var(--green)">${metric.conv}%</div><div class="metric-label">conversion signal</div></div>
        </div>
        <div class="live-box" data-testid="agents-room-live-status">
          <div class="live-box-dot" style="color:${statusColor}; background:${statusColor};"></div>
          <div class="live-box-text">${agent.liveStatus}</div>
        </div>
        <a href="/" class="init-btn" data-testid="activate-agent-btn" style="border-color:${agent.hex}44; box-shadow: inset 0 0 20px ${agent.hex}10, 0 12px 32px rgba(0,0,0,0.22);">Initialize ${agent.name}</a>
      `;
    }

    function animateCameraTo(index) {
      if (index === null) {
        gsap.to(camState, { ...baseCameraState, duration: 1.15, ease: "power3.inOut", onUpdate: updateCamera });
        return;
      }
      const robot = robots[index];
      const angle = Math.atan2(robot.focusTarget.x, robot.focusTarget.z + 3);
      gsap.to(camState, {
        theta: angle * 0.35,
        phi: 0.98,
        radius: 10.6,
        tx: robot.focusTarget.x,
        ty: 1.2,
        tz: robot.focusTarget.z + 0.3,
        duration: 1.05,
        ease: "power3.inOut",
        onUpdate: updateCamera,
      });
    }

    function selectAgent(index) {
      selected = selected === index ? null : index;
      buildList();
      buildDetail();
      animateCameraTo(selected);
      labelMap.forEach((label, labelIndex) => {
        label.classList.toggle("is-active", labelIndex === selected);
      });
    }

    function updateLabels() {
      const width = container.clientWidth;
      const height = container.clientHeight;
      robots.forEach((robot, index) => {
        const label = labelMap.get(index);
        const world = robot.labelAnchor.clone();
        world.project(camera);
        const isVisible = world.z < 1 && world.z > -1;
        const x = (world.x * 0.5 + 0.5) * width;
        const y = (-world.y * 0.5 + 0.5) * height;
        label.style.left = `${x}px`;
        label.style.top = `${y}px`;
        label.style.opacity = isVisible ? (selected === index || hovered === index ? 1 : 0.86) : 0;
        label.style.visibility = isVisible ? "visible" : "hidden";
      });
    }

    let isDragging = false;
    let lastX = 0;
    let lastY = 0;

    renderer.domElement.addEventListener("mousedown", (event) => {
      isDragging = true;
      dragDistance = 0;
      lastX = event.clientX;
      lastY = event.clientY;
    });

    window.addEventListener("mouseup", () => {
      isDragging = false;
    });

    window.addEventListener("mousemove", (event) => {
      if (!isDragging) return;
      dragDistance += Math.abs(event.clientX - lastX) + Math.abs(event.clientY - lastY);
      camState.theta -= (event.clientX - lastX) * 0.0048;
      camState.phi = Math.max(0.56, Math.min(1.22, camState.phi + (event.clientY - lastY) * 0.0032));
      lastX = event.clientX;
      lastY = event.clientY;
      updateCamera();
    });

    renderer.domElement.addEventListener("wheel", (event) => {
      camState.radius = Math.max(8.4, Math.min(24, camState.radius + event.deltaY * 0.012));
      updateCamera();
    }, { passive: true });

    let touchX = 0;
    let touchY = 0;
    renderer.domElement.addEventListener("touchstart", (event) => {
      dragDistance = 0;
      touchX = event.touches[0].clientX;
      touchY = event.touches[0].clientY;
    }, { passive: true });

    renderer.domElement.addEventListener("touchmove", (event) => {
      event.preventDefault();
      dragDistance += Math.abs(event.touches[0].clientX - touchX) + Math.abs(event.touches[0].clientY - touchY);
      camState.theta -= (event.touches[0].clientX - touchX) * 0.0045;
      camState.phi = Math.max(0.56, Math.min(1.22, camState.phi + (event.touches[0].clientY - touchY) * 0.003));
      touchX = event.touches[0].clientX;
      touchY = event.touches[0].clientY;
      updateCamera();
    }, { passive: false });

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    function pickAgent(clientX, clientY) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const objects = [];
      robots.forEach((robot) => robot.group.traverse((obj) => { if (obj.isMesh) objects.push(obj); }));
      const hits = raycaster.intersectObjects(objects);
      if (!hits.length) return null;
      let found = null;
      robots.forEach((robot, index) => {
        robot.group.traverse((obj) => {
          if (obj === hits[0].object) found = index;
        });
      });
      return found;
    }

    renderer.domElement.addEventListener("mousemove", (event) => {
      const result = pickAgent(event.clientX, event.clientY);
      hovered = result;
    });

    renderer.domElement.addEventListener("click", (event) => {
      if (dragDistance > 7) {
        dragDistance = 0;
        return;
      }
      const found = pickAgent(event.clientX, event.clientY);
      if (found !== null) selectAgent(found);
    });

    function resize() {
      const width = container.clientWidth;
      const height = container.clientHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / Math.max(height, 1);
      camera.updateProjectionMatrix();
    }
    window.addEventListener("resize", resize);
    resize();

    buildList();
    buildDetail();

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;

      robots.forEach((robot, index) => {
        const isSelected = selected === index;
        const isHovered = hovered === index;
        const amp = robot.agent.status === "idle" ? 0.02 : 0.06;
        robot.group.position.y = Math.sin(t * 1.55 + index * 0.55) * amp;
        robot.bodyGroup.position.y = -0.12 + Math.sin(t * 1.75 + index * 0.8) * 0.05;
        robot.leftArm.rotation.x = Math.sin(t * 1.4 + index) * 0.22;
        robot.rightArm.rotation.x = -Math.sin(t * 1.4 + index) * 0.22;
        robot.leftLeg.rotation.x = Math.sin(t * 1.1 + index) * 0.08;
        robot.rightLeg.rotation.x = -Math.sin(t * 1.1 + index) * 0.08;
        robot.halo.rotation.z += 0.006;
        robot.ring.rotation.z -= 0.006;
        robot.monitorScreen.material.emissiveIntensity = isSelected ? 2.1 : isHovered ? 1.7 : (robot.agent.status === "idle" ? 0.5 : 1.3 + Math.sin(t * 2 + index) * 0.16);
        robot.point.intensity = isSelected ? 2.65 : isHovered ? 2.1 : robot.agent.status === "idle" ? 0.65 : 1.45;
        robot.ring.material.opacity = isSelected ? 1 : isHovered ? 0.85 : robot.agent.status === "idle" ? 0.18 : 0.68;
        robot.halo.material.opacity = isSelected ? 1 : isHovered ? 0.84 : 0.68;
        robot.group.scale.setScalar(isSelected ? 1.07 : isHovered ? 1.03 : 1);
      });

      globe.rotation.y += 0.008;
      particles.rotation.y += 0.0009;
      haze.scale.setScalar(1 + Math.sin(t * 0.8) * 0.04);
      updateLabels();
      renderer.render(scene, camera);
    }
    animate();

    setInterval(() => {
      metrics = metrics.map((item, index) => {
        if (AGENTS[index].status === "idle") return item;
        return {
          active: Math.max(0, item.active + Math.floor(Math.random() * 3) - 1),
          today: Math.random() < 0.07 ? item.today + 1 : item.today,
          conv: Math.max(0, +(item.conv + (Math.random() - 0.5) * 0.3).toFixed(1)),
        };
      });
      buildList();
      buildDetail();
    }, 2400);
  </script>
</body>
</html>
