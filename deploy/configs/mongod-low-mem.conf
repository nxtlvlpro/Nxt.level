# =====================================================================
# MongoDB low-memory profile — для VPS с 2 GB RAM.
# Применить: добавить блок storage.wiredTiger в /etc/mongod.conf
# и перезапустить mongod: sudo systemctl restart mongod.
# На серверах с 4+ GB этот файл не нужен — Mongo сам подберёт ~50% RAM.
# =====================================================================

storage:
  dbPath: /var/lib/mongodb
  journal:
    enabled: true
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.5  # ← ограничиваем кеш на маленьких серверах

systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log

net:
  port: 27017
  bindIp: 127.0.0.1  # ← наружу НЕ торчим, только локально

processManagement:
  timeZoneInfo: /usr/share/zoneinfo
