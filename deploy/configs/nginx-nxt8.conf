# =====================================================================
# /etc/nginx/sites-available/nxt8.pro
# Single-domain setup: static React + /api proxy → 127.0.0.1:8001
# Install: certbot rewrites the listen 443 / ssl block on first --nginx run.
# =====================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name nxt8.pro www.nxt8.pro;
    return 301 https://nxt8.pro$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nxt8.pro www.nxt8.pro;

    # ---- TLS (certbot fills these in via `certbot --nginx`) ----
    # ssl_certificate     /etc/letsencrypt/live/nxt8.pro/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nxt8.pro/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ---- Static React build (yarn build → /home/nxt8/app/frontend/build) ----
    root /home/nxt8/app/frontend/build;
    index index.html;

    # Voice STT upload — server.py limits at 25 MB; nginx must allow at least that.
    client_max_body_size 30M;

    # Gzip text + JSON + CSS + JS
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;

    # Long-cache hashed assets
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico|mp3|webm)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA: всё что не статика → index.html (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Backend API ----
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-стрим /api/chat/stream требует длинного таймаута + отключённой буферизации
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        # WS upgrade — задел на будущие websocket каналы
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        # Не сжимать стримы (sse-content-type)
        gzip off;
    }

    # ---- Health endpoint, удобный для внешних monitors ----
    location = /healthz {
        proxy_pass http://127.0.0.1:8001/api/health;
        access_log off;
    }

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissive CSP — голос требует mediaDevices.getUserMedia (HTTPS-only, уже выполнено)
    # Если хочется ужесточить — добавить content-security-policy директиву позже.
}
